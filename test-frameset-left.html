<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Frameset 左侧面板</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 16px; background: #f5f5f5; }
    h2 { margin-top: 0; color: #333; border-bottom: 2px solid #007aff; padding-bottom: 8px; }
    .menu-item { padding: 8px 12px; background: white; border-radius: 4px; margin-bottom: 8px; cursor: pointer; transition: background 0.2s; }
    .menu-item:hover { background: #e8f0fe; }
    .menu-item:active { background: #d0e6ff; }
    .info-box { background: #fff3cd; border: 1px solid #ffeeba; border-radius: 4px; padding: 12px; margin-top: 16px; font-size: 12px; color: #856404; }
  </style>
</head>
<body>
  <h2>Frameset 左侧面板</h2>
  <p>这是 <frame> 标签加载的左侧内容区域。</p>
  
  <div class="menu-item">📁 文件管理</div>
  <div class="menu-item">🔍 搜索功能</div>
  <div class="menu-item">⚙️ 系统设置</div>
  <div class="menu-item">📊 数据统计</div>
  
  <div class="info-box">
    <strong>提示：</strong><br>
    在此区域选中文字，测试划词工具栏是否正常显示。<br>
    支持拖拽选中和双击选中。
  </div>
  
  <p>更多测试文本：Frameset 是 HTML4 时代的框架布局方式，使用 frame 标签而非 iframe。这种页面结构没有 body 元素，工具栏需要特殊处理才能正常工作。</p>
</body>
</html>
